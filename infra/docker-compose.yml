services:
  postgres:
    image: postgres:16
    container_name: apple-news-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apple_news}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apple_news_password}
      POSTGRES_DB: ${POSTGRES_DB:-apple_news_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../src/storage/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apple_news} -d ${POSTGRES_DB:-apple_news_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apple_news_net

  neo4j:
    image: neo4j:5-community
    container_name: apple-news-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-apple_news_neo4j_password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - apple_news_net

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: apple-news-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apple_news_net

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: apple-news-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apple_news_net

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T17-46-06Z
    container_name: apple-news-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb -p local/raw-news local/raw-social local/bronze local/silver local/gold local/model-artifacts;
      exit 0;
      "
    networks:
      - apple_news_net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    container_name: apple-news-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - apple_news_net

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: apple-news-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-apple_news}:${POSTGRES_PASSWORD:-apple_news_password}@postgres:5432/${POSTGRES_DB:-apple_news_db}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
    volumes:
      - ../:/opt/airflow/project
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Apple --lastname News --role Admin --email admin@example.com || true"
    networks:
      - apple_news_net

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: apple-news-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-apple_news}:${POSTGRES_PASSWORD:-apple_news_password}@postgres:5432/${POSTGRES_DB:-apple_news_db}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
      PYTHONPATH: /opt/airflow/project
    ports:
      - "8080:8080"
    volumes:
      - ../:/opt/airflow/project
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
    networks:
      - apple_news_net

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: apple-news-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-apple_news}:${POSTGRES_PASSWORD:-apple_news_password}@postgres:5432/${POSTGRES_DB:-apple_news_db}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ../:/opt/airflow/project
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 20s
      timeout: 10s
      retries: 15
    networks:
      - apple_news_net

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: apple-news-backend
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      REDPANDA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - apple_news_net

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: apple-news-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - apple_news_net

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: apple-news-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - apple_news_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: apple-news-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - apple_news_net

networks:
  apple_news_net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  minio_data:
  redpanda_data:
  airflow_logs:
  prometheus_data:
  grafana_data:
